<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Review – Litterboxd</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    .container { max-width: 560px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input[type="number"], input[type="text"], textarea, input[type="file"] { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    textarea { min-height: 80px; resize: vertical; }
    button { margin-top: 16px; padding: 10px 20px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #218838; }
    .success { margin-top: 16px; padding: 12px; background: #d4edda; color: #155724; border-radius: 4px; }
    .error { margin-top: 16px; padding: 12px; background: #f8d7da; color: #721c24; border-radius: 4px; }
    a { color: #0066cc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Submit Bathroom Review</h1>
    <p><a href="/">← Back to bathrooms</a></p>
    <form id="reviewForm" enctype="multipart/form-data">
      <label for="bathroomId">Bathroom ID</label>
      <input type="number" id="bathroomId" name="bathroom_id" min="1" required>

      <label for="userId">Your User ID / Email</label>
      <input type="text" id="userId" name="user_id" required placeholder="e.g. netid@illinois.edu">

      <label for="rating">Rating (1–10)</label>
      <input type="number" id="rating" name="rating" min="1" max="10" required>

      <label for="comment">Comment (optional)</label>
      <textarea id="comment" name="comment" placeholder="How was it?"></textarea>

      <label for="image">Image (optional)</label>
      <input type="file" id="image" name="image" accept="image/*">

      <button type="submit">Submit Review</button>
    </form>
    <div id="responseMessage"></div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const bid = params.get('bathroom_id');
      if (bid) {
        document.getElementById('bathroomId').value = bid;
      }
    })();

    const form = document.getElementById('reviewForm');
    const responseMessage = document.getElementById('responseMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      responseMessage.innerHTML = '';
      const bathroomId = document.getElementById('bathroomId').value;
      const userId = document.getElementById('userId').value;
      const formData = new FormData(form);

      try {
        const response = await fetch(`/v1/bathrooms/${bathroomId}/reviews?user_id=${encodeURIComponent(userId)}`, {
          method: 'POST',
          body: formData
        });

        const data = await response.json().catch(() => ({}));

        if (response.ok) {
          let msg = `Review submitted. Review ID: ${data.review_id}`;
          if (data.image_url) msg += `<br><img src="${data.image_url}" alt="Uploaded" style="max-width:100%; margin-top:8px;">`;
          responseMessage.innerHTML = `<div class="success">${msg}</div>`;
          form.reset();
          const bid = new URLSearchParams(location.search).get('bathroom_id');
          if (bid) document.getElementById('bathroomId').value = bid;
        } else {
          const detail = typeof data.detail === 'string' ? data.detail : (data.detail?.message || JSON.stringify(data.detail || data));
          responseMessage.innerHTML = `<div class="error">Error: ${detail}</div>`;
        }
      } catch (err) {
        responseMessage.innerHTML = `<div class="error">Network error: ${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
